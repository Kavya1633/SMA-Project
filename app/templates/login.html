{% extends 'base.html' %}

{% block content %}
<!-- We fill in the "content" block from base.html -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">SMA Dashboard</h3>
                    <!-- action="/login" → form submits to the /login route -->
                    <!-- method="POST" → sends data securely in the request body -->
                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <!-- name="email" → matches request.form.get('email') in Python -->
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>
                    <p class="text-center mt-3">
                        No account? <a href="/register">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
